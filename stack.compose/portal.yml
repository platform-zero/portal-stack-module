services:
  portal:
    image: webservices/portal:local-build
    build:
      context: .
      dockerfile: ./stack.containers/portal/Dockerfile
    container_name: portal
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      caddy:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
      PORTAL_CONTRACTS_PATH: /contracts/service-contracts.json
      PORTAL_COMPONENT_LOCK_PATH: /contracts/components.lock.json
      PORTAL_PROFILES_PATH: /contracts/portal-profiles.json
      PORTAL_REPORTS_DIR: /contracts/reports
      PORTAL_PROGRESS_BASE_URL: http://progression:8130
      PORTAL_WORKSPACES_BASE_URL: http://workspace-provisioner:8120
      PORTAL_CHATGPT_CONNECTOR_BASE_URL: http://chatgpt-connector:8130
      PORTAL_GRAFANA_BASE_URL: http://grafana:3000
      PORTAL_KOPIA_BASE_URL: http://kopia:51515
    volumes:
      - ./configs/service-contracts.json:/contracts/service-contracts.json:ro
      - ./configs/portal-profiles.json:/contracts/portal-profiles.json:ro
      - ./build/site/components.lock.json:/contracts/components.lock.json:ro
      - ./reports:/contracts/reports:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
